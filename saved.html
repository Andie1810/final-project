<!DOCTYPE html>
<html lang="en">
  <head>

    <title>Saved Outfits - Outfit Roulette</title>
    <link rel="stylesheet" href="screen.css">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400..600&family=Young+Serif&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              burgundy: "#7B0D1E",
              cherry: "#9F2042",
              blush: "#F8E5EE",
              smoke: "#F5F5F5",
            },
            fontFamily: {
              serif: ['Young Serif', 'serif'],
              sans: ['Instrument Sans', 'sans-serif'],
            }
          }
        }
      }
  </script>
  </head>
  
  <body class="bg-blush text-burgundy flex flex-col min-h-screen">
    <header class="sticky top-0 left-0 w-full bg-blush">
      <div class="max-w-6xl mx-auto flex justify-between items-center py-4">
        <div class="border border-burgundy px-6 py-1 rounded-full font-serif text-base">
          <a href="index.html">outfit roulette</a>
        </div>
        <nav class="flex items-center gap-10 font-sans font-medium uppercase text-sm">
          <a href="generator.html" class="hover:underline underline-offset-4 decoration-2">Generator</a>
          <a href="saved.html" class="hover:underline underline-offset-4 decoration-2">Saved Outfits</a>
          <a href="#">
            <img src="user.svg" alt="User" class="w-7 h-7"/>
          </a>
        </nav>
      </div>
    </header>

    <main class="flex-1 flex flex-col py-20 px-6">
        <h1 class="text-6xl font-serif text-center mb-12">saved outfits</h1>
        <div id="empty-state" class="hidden flex-1 flex flex-col items-center justify-center gap-5 text-center">
        <p class="font-sans text-base text-burgundy">No saved outfits yet. Go generate one!</p>
        <button class="border-2 border-burgundy px-6 py-2 font-sans font-semibold text-x hover:bg-burgundy hover:text-blush transition">
          <a href="generator.html">Go to Generator</a>
        </button>
      </div>
      <div id="outfits-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto w-full">
      </div>
    </main>

    <footer class="border-t border-burgundy/30 w-full py-6 font-serif text-xs">
      <div class="max-w-6xl mx-auto w-full flex justify-between items-center">
        <p>Mix, match, and have fun</p>
        <div class="flex gap-8 font-sans">
          <a href="#">About</a>
          <a href="#">Contact</a>
          <a href="#">Terms</a>
