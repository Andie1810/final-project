<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator - Outfit Roulette</title>
    <link rel="stylesheet" href="screen.css">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400..600&family=Young+Serif&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              burgundy: "#7B0D1E",
              cherry: "#9F2042",
              blush: "#F8E5EE",
              smoke: "#F5F5F5",
            },
            fontFamily: {
              serif: ['Young Serif', 'serif'],
              sans: ['Instrument Sans', 'sans-serif'],
            }
          }
        }
      }
  </script>
  </head>
  
  <body class="bg-blush text-burgundy flex flex-col">
    <header class="max-w-6xl mx-auto flex justify-between items-center w-full bg-blush py-4">
      <div class="border border-burgundy px-6 py-1 rounded-full font-serif text-base">
        <a href="index.html">outfit roulette</a>
      </div>
      <nav class="flex items-center gap-10 font-sans font-medium uppercase text-sm">
        <a href="generator.html" class="hover:underline underline-offset-4 decoration-2">Generator</a>
        <a href="saved.html" class="hover:underline underline-offset-4 decoration-2">Saved Outfits</a>
        <a href="#">
          <img src="user.svg" alt="User" class="w-7 h-7"/>
        </a>
      </nav>
    </header>

    <main class="h-[calc(100vh-56px)] flex flex-col py-20 px-6">
        <h1 class="text-6xl font-serif text-center mb-12">let's create an outfit</h1>
        <p class="text-center font-sans font-medium text-base mb-4">What's the vibe?</p>
        <div class="flex gap-4 mb-12 flex-wrap justify-center">
          <button onclick="setVibe('all')" id="vibe-all"
            class="vibe-btn active-vibe w-[110px] py-2 rounded-full border border-cherry font-sans font-medium text-sm transition">
            All
          </button>
          <button onclick="setVibe('casual')" id="vibe-casual"
            class="vibe-btn w-[110px] py-2 rounded-full border border-cherry font-sans font-medium text-sm transition">
            Casual
          </button>
          <button onclick="setVibe('work')" id="vibe-work"
            class="vibe-btn w-[110px] py-2 rounded-full border border-cherry font-sans font-medium text-sm transition">
            Work
          </button>
          <button onclick="setVibe('sporty')" id="vibe-sporty"
            class="vibe-btn w-[110px] py-2 rounded-full border border-cherry font-sans font-medium text-sm transition">
            Sporty
          </button>
          <button onclick="setVibe('goingout')" id="vibe-goingout"
            class="vibe-btn w-[110px] py-2 rounded-full border border-cherry font-sans font-medium text-sm transition">
            Going Out
          </button>
        </div>

        <div class="flex gap-4 mb-12 flex-wrap justify-center">
          <div class="flex flex-col items-center gap-2">
            <div id="card-top" class="w-40 h-48 bg-smoke rounded-2xl flex items-center justify-center">
              <span class="text-6xl text-cherry font-serif">?</span>
            </div>
            <p class="font-sans text-sm">Top</p>
          </div>
          <div class="flex flex-col items-center gap-2">
            <div id="card-bottom" class="w-40 h-48 bg-smoke rounded-2xl flex items-center justify-center">
              <span class="text-6xl text-cherry font-serif">?</span>
            </div>
            <p class="font-sans text-sm">Bottom</p>
          </div>
          <div class="flex flex-col items-center gap-2">
            <div id="card-outer" class="w-40 h-48 bg-smoke rounded-2xl flex items-center justify-center">
              <span class="text-6xl text-cherry font-serif">?</span>
            </div>
            <p class="font-sans text-sm">Outerwear</p>
          </div>
          <div class="flex flex-col items-center gap-2">
            <div id="card-shoes" class="w-40 h-48 bg-smoke rounded-2xl flex items-center justify-center">
              <span class="text-6xl text-cherry font-serif">?</span>
            </div>
            <p class="font-sans text-sm">Shoes</p>
          </div>
          <div class="flex flex-col items-center gap-2">
            <div id="card-bag" class="w-40 h-48 bg-smoke rounded-2xl flex items-center justify-center">
              <span class="text-6xl text-cherry font-serif">?</span>
            </div>
            <p class="font-sans text-sm">Bag</p>
          </div>
        </div>

        <div class="flex items-center justify-center gap-4">
            <button id="generate-btn" onclick="generateOutfit()"
                class="border-2 border-burgundy px-16 py-2 font-sans font-semibold text-base hover:bg-burgundy hover:text-blush transition">
                Generate Outfit
            </button>
            <button id="save-btn" onclick="saveOutfit()" class="hidden">
                <img src="heart.svg" alt="Save outfit" class="w-7 h-7" />
            </button>
            </div>
    </main>

    <footer class="border-t border-burgundy/30 w-full py-6 font-serif text-xs">
      <div class="max-w-6xl mx-auto w-full flex justify-between items-center">
        <p>Mix, match, and have fun</p>
        <div class="flex gap-8 font-sans">
          <a href="#">About</a>
          <a href="#">Contact</a>
          <a href="#">Terms</a>
          <a href="#">Privacy</a>
        </div>
      </div>
    </footer>
    <script src="generator.js"></script>
    </body>
</html>
